<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Consolas, monospace" font-size="12">
  <title>RS-485 Fieldbus Wiring Detail — Modbus RTU</title>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#333"/></marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">RS-485 Fieldbus — Modbus RTU Wiring Detail</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" fill="#666">9600 baud | Mega = Master | Uno = Slave ID 1</text>

  <!--  MEGA SIDE-->
  <rect x="30" y="80" width="300" height="250" rx="10" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="38" y="88" width="284" height="234" rx="7" fill="#1e40af"/>
  <text x="180" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="white">PLC 1 — Arduino Mega</text>
  <text x="180" y="128" text-anchor="middle" font-size="10" fill="#93c5fd">Modbus RTU MASTER</text>

  <!-- Mega pins -->
  <g font-size="11" fill="#93c5fd">
    <text x="60" y="160">TX1 (D18) ─────→</text>
    <text x="60" y="185">RX1 (D19) ←─────</text>
    <text x="60" y="215">D2 ─────────────→</text>
  </g>

  <!-- MAX485 Module — Mega side -->
  <rect x="340" y="100" width="110" height="210" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="395" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">MAX485</text>
  <text x="395" y="136" text-anchor="middle" font-size="9" fill="#a16207">(Mega side)</text>

  <g font-size="10" fill="#854d0e">
    <text x="355" y="162">DI  ←</text>
    <text x="355" y="187">RO  →</text>
    <text x="355" y="217">DE ←</text>
    <text x="355" y="232">RE ←</text>
    <text x="355" y="257">VCC</text>
    <text x="355" y="272">GND</text>
  </g>

  <!-- DE+RE tied together note -->
  <rect x="350" y="205" width="90" height="35" rx="3" fill="none" stroke="#ca8a04" stroke-dasharray="3"/>
  <text x="395" y="248" text-anchor="middle" font-size="8" fill="#a16207">tied together</text>

  <!-- Bus terminals Mega side -->
  <g font-size="11" font-weight="bold" fill="#854d0e">
    <text x="420" y="162">→ A</text>
    <text x="420" y="187">→ B</text>
  </g>

  <!--  TWISTED PAIR BUS-->
  <!-- Wire A -->
  <line x1="453" y1="155" x2="540" y2="155" stroke="#dc2626" stroke-width="3"/>
  <line x1="540" y1="155" x2="540" y2="130" stroke="#dc2626" stroke-width="3"/>

  <!-- Termination resistor Mega side -->
  <rect x="523" y="118" width="35" height="20" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="540" y="132" text-anchor="middle" font-size="8" fill="#991b1b">120Ω</text>

  <line x1="540" y1="118" x2="540" y2="100" stroke="#dc2626" stroke-width="3"/>
  <line x1="540" y1="100" x2="540" y2="85" stroke="#16a34a" stroke-width="3"/>

  <!-- Wire B -->
  <line x1="453" y1="180" x2="540" y2="180" stroke="#16a34a" stroke-width="3"/>
  <line x1="540" y1="180" x2="540" y2="138" stroke="#16a34a" stroke-width="3"/>

  <!-- Main bus line -->
  <line x1="540" y1="155" x2="640" y2="155" stroke="#dc2626" stroke-width="3"/>
  <line x1="540" y1="180" x2="640" y2="180" stroke="#16a34a" stroke-width="3"/>

  <!-- Twisted pair visual -->
  <text x="590" y="145" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="bold">A (Data+)</text>
  <text x="590" y="198" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="bold">B (Data-)</text>

  <!-- Twist indication -->
  <text x="590" y="170" text-anchor="middle" font-size="18" fill="#666">⟿ ⟿ ⟿</text>
  <text x="590" y="220" text-anchor="middle" font-size="9" fill="#666">Twisted pair cable</text>

  <!-- Termination resistor Uno side -->
  <line x1="640" y1="155" x2="640" y2="130" stroke="#dc2626" stroke-width="3"/>
  <rect x="623" y="118" width="35" height="20" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="640" y="132" text-anchor="middle" font-size="8" fill="#991b1b">120Ω</text>
  <line x1="640" y1="118" x2="640" y2="100" stroke="#dc2626" stroke-width="3"/>
  <line x1="640" y1="100" x2="640" y2="85" stroke="#16a34a" stroke-width="3"/>
  <line x1="640" y1="180" x2="640" y2="138" stroke="#16a34a" stroke-width="3"/>

  <!-- Connect to Uno MAX485 -->
  <line x1="640" y1="155" x2="725" y2="155" stroke="#dc2626" stroke-width="3"/>
  <line x1="640" y1="180" x2="725" y2="180" stroke="#16a34a" stroke-width="3"/>

  <!--  MAX485 — Uno side-->
  <rect x="725" y="100" width="110" height="210" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="780" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">MAX485</text>
  <text x="780" y="136" text-anchor="middle" font-size="9" fill="#a16207">(Uno side)</text>

  <g font-size="10" fill="#854d0e">
    <text x="738" y="162">A →</text>
    <text x="738" y="187">B →</text>
    <text x="738" y="217">DE →</text>
    <text x="738" y="232">RE →</text>
    <text x="738" y="257">VCC</text>
    <text x="738" y="272">GND</text>
  </g>

  <!-- DE+RE tied together -->
  <rect x="733" y="205" width="90" height="35" rx="3" fill="none" stroke="#ca8a04" stroke-dasharray="3"/>

  <!-- DI/RO labels -->
  <text x="810" y="162" font-size="10" fill="#854d0e">DI ←</text>
  <text x="810" y="187" font-size="10" fill="#854d0e">RO →</text>

  <!--  UNO SIDE-->
  <!-- Wires to Uno pins (conceptual) -->
  <text x="790" y="300" text-anchor="middle" font-size="10" fill="#4f46e5">→ TX (D1)</text>
  <text x="790" y="285" text-anchor="middle" font-size="10" fill="#4f46e5">→ RX (D0)</text>
  <text x="790" y="315" text-anchor="middle" font-size="10" fill="#4f46e5">→ D2</text>

  <!--  NOTES-->
  <rect x="30" y="345" width="840" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="50" y="365" font-size="11" font-weight="bold" fill="#333">WIRING CHECKLIST:</text>
  <text x="50" y="382" font-size="10" fill="#555">1. Connect MAX485 A↔A and B↔B between both modules using twisted pair cable</text>
  <text x="50" y="396" font-size="10" fill="#555">2. Add 120Ω resistor across A-B at EACH end (both MAX485 modules) if cable > 30cm</text>

  <!-- Direction labels -->
  <text x="180" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">MASTER</text>
  <text x="180" y="315" text-anchor="middle" font-size="10" fill="#3b82f6">Initiates polls</text>
  <text x="180" y="330" text-anchor="middle" font-size="10" fill="#3b82f6">Reads 5 registers</text>

  <text x="450" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#666">← 9600 baud →</text>
  <text x="450" y="288" text-anchor="middle" font-size="10" fill="#888">Half-duplex: DE pin toggles TX/RX direction</text>
  <text x="450" y="303" text-anchor="middle" font-size="10" fill="#888">preTransmission(): DE=HIGH (transmit)</text>
  <text x="450" y="318" text-anchor="middle" font-size="10" fill="#888">postTransmission(): DE=LOW (receive)</text>
</svg>
